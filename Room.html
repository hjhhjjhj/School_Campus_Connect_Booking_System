<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <title>Campus Connect Booking System</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="css/Room.css">
    </head>
    <body>
        <div id="top_title">
            <div id="top_title_left" class="top_title_left_class">
                <header>
                    <h1>Campus Connect Booking System</h1>
                </header>
            </div>
            <div id="top_title_right" class="top_title_right_class">
                <nav>
                    <a href="index.html">Home</a> <a href="Room.html">Room</a> <a href="My_Booking.html">My Booking</a> <a href="Pending_review_application.html" class="teacher-link" style="display:none">Pending Review</a> <a href="Login.html">Login</a>
                </nav>
                <span id="user_display" class="user-display"></span>
            </div>
        </div>
        <div id="Room_main_search_box">
            <div class="search-row">
                <label for="Room_search_input_buildings">Room or building</label>
                <input type="search" id="Room_search_input_buildings" placeholder="Search rooms, buildings, or capacity">
            </div>
            <div class="search-row">
                <label for="Room_search_input_date">Date</label>
                <input type="date" id="Room_search_input_date">
            </div>
            <div class="search-row">
                <label for="Room_search_input_time">Time</label>
                <input type="time" id="Room_search_input_time">
            </div>
            <div class="search-row">
                <label for="Room_search_input_capacity">Capacity</label>
                <input type="number" id="Room_search_input_capacity" min="1">
            </div>
            <div class="search-actions">
                <button id="Room_search_button_filter">Filter</button>
            </div>
        </div>
        <div id="Room_main_mid_page">
            <div id="Room_main_mid_page_title">
                <h2> Room List </h2><br>
            </div>
            <div id="Room_main_mid_page_content">
                <!-- Dynamic loading of room information -->
            </div>
            <div id="Room_main_mid_page_bottom">
                <p> Status Legend: Green = Available, Red = Booked </p>
            </div>
        </div>
        <script src="JavaScript/log.js"></script>
        <script src="JavaScript/room.js"></script>
    </body>
</html>
