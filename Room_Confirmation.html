<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <title>Campus Connect Booking System</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div id="top_title">
            <div id="top_title_left" class="top_title_left_class">
                <header>
                    <h1>Campus Connect Booking System</h1>
                </header>
            </div>
            <div id="top_title_right" class="top_title_right_class">
                <nav>
                    <a href="index.html">Home</a> <a href="Room.html">Room</a> <a href="My_Booking.html">My Booking</a> <a href="Pending_review_application.html" class="teacher-link" style="display:none">Pending Review</a> <a href="Login.html">Login</a>
                </nav>
                <span id="user_display" class="user-display"></span>
            </div>
        </div>
        <div id="confirmation_container">
            <div id="confirmation_content">
                <h2>Booking Confirmation</h2>
                <div id="booking_details" class="booking-details">
                    <!-- Booking details will be loaded here -->
                </div>
                
                <div class="booking-time-section">
                    <h3>Select Booking Time</h3>
                    <div class="date-picker-row">
                        <label for="booking_date">Select Date</label>
                        <input type="date" id="booking_date" />
                    </div>
                    <div id="time_slots_container" class="time-slots-grid">
                        <!-- Time slots will be generated here -->
                    </div>
                    <div id="selected_time_display" class="selected-time-display" style="display:none;">
                        <p>Selected Time: <span id="selected_time_text"></span></p>
                    </div>
                </div>
                
                <div class="confirmation-actions">
                    <button id="confirm_button">Confirm Booking</button>
                    <button id="cancel_button">Cancel</button>
                </div>
            </div>
        </div>
        <script src="JavaScript/log.js"></script>
        <script src="JavaScript/room_confirmation.js"></script>
    </body>
</html>
